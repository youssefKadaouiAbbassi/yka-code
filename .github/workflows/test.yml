name: Test

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }} / bun ${{ matrix.bun }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun: ["1.2.x", "latest"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}
      - run: bun install --frozen-lockfile
      - run: bun tsc --noEmit
      - run: bun test tests/unit tests/integration tests/scenarios

  lint-hooks:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - run: sudo apt-get install -y shellcheck
      - run: shellcheck configs/hooks/*.sh configs/project-claude/hooks/*.sh bootstrap.sh

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Run actionlint
        run: |
          bash <(curl -fsSL --connect-timeout 15 --max-time 60 \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  bats-ubuntu:
    name: Post-install (Ubuntu)
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.x"
      - run: sudo apt-get install -y bats jq
      - run: bun install --frozen-lockfile
      - run: bun run bin/setup.ts setup --non-interactive --tier core
      - run: bats tests/ci/verify.bats

  bats-macos:
    name: Post-install (macOS)
    runs-on: macos-latest
    needs: [test]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.x"
      - run: brew install bats-core jq
      - run: bun install --frozen-lockfile
      - run: bun run bin/setup.ts setup --non-interactive --tier core
      - run: bats tests/ci/verify.bats
